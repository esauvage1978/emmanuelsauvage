<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="933" viewBox="0 0 1400 933" fill="none" role="img" aria-label="Illustration graphique : d�veloppement web, data et automatisation">
  <defs>
    <linearGradient id="bgGrad" x1="130" y1="60" x2="1280" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8FC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="blobA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(350 210) rotate(35) scale(520 420)">
      <stop stop-color="#4F6EF7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4F6EF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 240) rotate(145) scale(520 440)">
      <stop stop-color="#2F3A8F" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2F3A8F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 840) rotate(-15) scale(560 380)">
      <stop stop-color="#4F6EF7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4F6EF7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="330" y1="240" x2="1080" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F8FC"/>
    </linearGradient>
    <linearGradient id="accent" x1="520" y1="380" x2="1010" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F6EF7"/>
      <stop offset="1" stop-color="#2F3A8F"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0B1020" flood-opacity="0.18"/>
    </filter>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="2.0" fill="#2F3A8F" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="933" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1400" height="933" fill="url(#dots)"/>

  <!-- Color blobs -->
  <g filter="url(#softBlur)">
    <ellipse cx="350" cy="210" rx="520" ry="420" fill="url(#blobA)"/>
    <ellipse cx="1120" cy="240" rx="520" ry="440" fill="url(#blobB)"/>
    <ellipse cx="760" cy="840" rx="560" ry="380" fill="url(#blobC)"/>
  </g>

  <!-- Floating chips -->
  <g filter="url(#softShadow)" opacity="0.96">
    <g transform="translate(238 360)">
      <rect x="0" y="0" width="210" height="64" rx="18" fill="#FFFFFF"/>
      <rect x="12" y="12" width="40" height="40" rx="14" fill="#4F6EF7" opacity="0.14"/>
      <path d="M31 24l-8 8 8 8" stroke="#2F3A8F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M36 40l8-8-8-8" stroke="#2F3A8F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="62" y="18" width="128" height="10" rx="5" fill="#2D2D2D" opacity="0.16"/>
      <rect x="62" y="36" width="98" height="10" rx="5" fill="#2D2D2D" opacity="0.12"/>
    </g>

    <g transform="translate(1030 300)">
      <rect x="0" y="0" width="250" height="72" rx="20" fill="#FFFFFF"/>
      <rect x="14" y="14" width="44" height="44" rx="16" fill="#2F3A8F" opacity="0.14"/>
      <path d="M36 25v22M25 36h22" stroke="#2F3A8F" stroke-width="3" stroke-linecap="round"/>
      <rect x="72" y="22" width="160" height="10" rx="5" fill="#2D2D2D" opacity="0.16"/>
      <rect x="72" y="42" width="120" height="10" rx="5" fill="#2D2D2D" opacity="0.12"/>
    </g>
  </g>

  <!-- Main laptop / dashboard card -->
  <g filter="url(#softShadow)">
    <rect x="360" y="230" width="860" height="560" rx="34" fill="url(#cardGrad)" stroke="#2D2D2D" stroke-opacity="0.10"/>
    <rect x="360" y="230" width="860" height="72" rx="34" fill="#FFFFFF"/>
    <path d="M394 266h12" stroke="#FF6384" stroke-width="8" stroke-linecap="round"/>
    <path d="M416 266h12" stroke="#FFCE56" stroke-width="8" stroke-linecap="round"/>
    <path d="M438 266h12" stroke="#4BC0C0" stroke-width="8" stroke-linecap="round"/>
    <rect x="478" y="255" width="230" height="22" rx="11" fill="#2D2D2D" opacity="0.10"/>

    <!-- Sidebar -->
    <rect x="392" y="320" width="216" height="440" rx="24" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.08"/>
    <rect x="418" y="352" width="160" height="14" rx="7" fill="#2D2D2D" opacity="0.12"/>
    <rect x="418" y="382" width="120" height="14" rx="7" fill="#2D2D2D" opacity="0.10"/>
    <rect x="418" y="422" width="176" height="46" rx="16" fill="#4F6EF7" opacity="0.12"/>
    <rect x="432" y="440" width="126" height="10" rx="5" fill="#2F3A8F" opacity="0.28"/>
    <rect x="418" y="486" width="176" height="14" rx="7" fill="#2D2D2D" opacity="0.10"/>
    <rect x="418" y="516" width="156" height="14" rx="7" fill="#2D2D2D" opacity="0.10"/>
    <rect x="418" y="546" width="136" height="14" rx="7" fill="#2D2D2D" opacity="0.10"/>

    <!-- Main content area -->
    <rect x="628" y="320" width="566" height="210" rx="24" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.08"/>
    <rect x="654" y="350" width="220" height="16" rx="8" fill="#2D2D2D" opacity="0.12"/>
    <rect x="654" y="376" width="320" height="12" rx="6" fill="#2D2D2D" opacity="0.08"/>

    <!-- Chart lines -->
    <path d="M654 476C718 430 766 446 820 408C886 362 930 412 996 374C1060 338 1108 352 1168 322" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M654 498C724 468 770 474 836 444C908 412 944 448 1010 420C1076 394 1112 404 1168 386" stroke="#2F3A8F" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
    <g>
      <circle cx="820" cy="408" r="9" fill="#4F6EF7"/>
      <circle cx="996" cy="374" r="9" fill="#4F6EF7"/>
      <circle cx="1168" cy="322" r="9" fill="#2F3A8F"/>
    </g>

    <!-- KPI cards -->
    <g opacity="0.98">
      <rect x="628" y="548" width="178" height="96" rx="22" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.08"/>
      <rect x="654" y="574" width="90" height="14" rx="7" fill="#2D2D2D" opacity="0.12"/>
      <rect x="654" y="602" width="120" height="22" rx="11" fill="#4F6EF7" opacity="0.16"/>

      <rect x="822" y="548" width="178" height="96" rx="22" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.08"/>
      <rect x="848" y="574" width="110" height="14" rx="7" fill="#2D2D2D" opacity="0.12"/>
      <rect x="848" y="602" width="128" height="22" rx="11" fill="#2F3A8F" opacity="0.14"/>

      <rect x="1016" y="548" width="178" height="96" rx="22" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.08"/>
      <rect x="1042" y="574" width="98" height="14" rx="7" fill="#2D2D2D" opacity="0.12"/>
      <rect x="1042" y="602" width="122" height="22" rx="11" fill="#4F6EF7" opacity="0.12"/>
    </g>

    <!-- Bottom laptop base -->
    <path d="M410 802h760c22 0 40 18 40 40H370c0-22 18-40 40-40Z" fill="#FFFFFF" stroke="#2D2D2D" stroke-opacity="0.10"/>
    <rect x="655" y="816" width="270" height="10" rx="5" fill="#2D2D2D" opacity="0.08"/>
  </g>

  <!-- Small node / api graph -->
  <g opacity="0.85" filter="url(#softShadow)">
    <g transform="translate(265 640)">
      <rect x="0" y="0" width="250" height="110" rx="22" fill="#FFFFFF"/>
      <path d="M46 56h54" stroke="#2D2D2D" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round"/>
      <circle cx="26" cy="56" r="10" fill="#4F6EF7"/>
      <circle cx="118" cy="56" r="10" fill="#2F3A8F"/>
      <path d="M118 56h54" stroke="#2D2D2D" stroke-opacity="0.18" stroke-width="8" stroke-linecap="round"/>
      <circle cx="190" cy="56" r="10" fill="#4F6EF7"/>
      <rect x="18" y="18" width="140" height="14" rx="7" fill="#2D2D2D" opacity="0.10"/>
      <rect x="18" y="82" width="180" height="14" rx="7" fill="#2D2D2D" opacity="0.08"/>
    </g>
  </g>
</svg>
